<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power BI Dashboards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container">
        <a href="../index.html" class="btn btn-outline-secondary mb-4">&larr; Back to Portfolio</a>
        <h1 class="mb-4">Power BI Dashboard Gallery</h1>
        
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <img src="../assets/dashboards/financial_summary.png" class="card-img-top" alt="Financial Summary Dashboard">
                    <div class="card-body">
                        <h5 class="card-title">Financial Summary</h5>
                        <p class="card-text">Tracking high-level KPIs, revenue streams, and performance metrics.</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <img src="../assets/dashboards/risk_assessment.png" class="card-img-top" alt="Risk Assessment Dashboard">
                    <div class="card-body">
                        <h5 class="card-title">Risk Assessment & Banking Data</h5>
                        <p class="card-text">Visualizing exposure, asset dispersion, and portfolio trends.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
